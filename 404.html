<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found &middot; Wei-Hsun Wang</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#007a40;--deep:#064d2a;--bg:#edf6f1;--ink:#10261a;--muted:#36513e}
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;
       text-align:center;padding:32px}
  .card{max-width:460px}
  .code{font-family:"Fraunces",Georgia,serif;font-size:5rem;font-weight:600;line-height:1;
        color:var(--green);letter-spacing:-.02em}
  h1{font-family:"Fraunces",Georgia,serif;font-size:1.6rem;font-weight:500;margin:14px 0 10px}
  p{color:var(--muted);font-size:1.02rem;line-height:1.5;margin-bottom:26px}
  a{display:inline-block;text-decoration:none;font-weight:600;font-size:.95rem;
    color:#fff;background:var(--green);padding:12px 22px;border-radius:10px;
    transition:background .15s ease}
  a:hover{background:var(--deep)}
</style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you&rsquo;re looking for doesn&rsquo;t exist or has moved.</p>
    <a href="./">Back to home</a>
  </div>
</body>
</html>
